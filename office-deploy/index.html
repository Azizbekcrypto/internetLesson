<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10141f">
<title>Pipeline HQ — jonli ofis</title>
<style>
  /* ═════════════════════ PALITRA ═════════════════════ */
  :root{
    --bg:#10141f;            /* tashqi qorong'u ramka (rasmdagi kabi) */
    --floor:#efe9dd;         /* ofis poli — iliq qog'oz */
    --floor2:#e7e0d2;        /* pol katagi */
    --wall:#2b3140;          /* devor */
    --wood:#c9a06c; --wood2:#b08850;
    --ink:#141a26; --ink2:#5b6472; --line:#e3e8f2;
    --accent:#FF4F28; --ok:#22A05C; --warn:#F5A623; --err:#e03131;
    --glass:rgba(150,195,255,.16); --glassline:rgba(110,160,230,.55);
    --panel:#171d2b; --panel2:#1f2736; --ptext:#e8ecf5; --pdim:#8d97ab;
    --gold:#e9b949; --gold2:#c9992e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,'Segoe UI',Roboto,sans-serif;color:var(--ink);
    background:radial-gradient(1400px 700px at 50% -20%,#1b2233,var(--bg));overflow:hidden;
    display:flex;flex-direction:column}

  /* ═════════════════════ YUQORI BANNER (HQ) ═════════════════════ */
  .topbar{display:flex;align-items:center;gap:14px;padding:10px 18px;flex:0 0 auto}
  .hq{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(180deg,#232b3d,#161c2a);
    border:2px solid var(--gold2);box-shadow:0 0 0 2px #0c0f16,0 6px 18px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
    border-radius:12px;padding:7px 16px}
  .hq .t{font-weight:900;letter-spacing:.22em;font-size:15px;color:var(--gold);text-shadow:0 1px 0 #000}
  .hq .b{font-size:17px}
  .avarow{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid #2a3345;border-radius:999px;padding:5px 12px 5px 7px}
  .ava{position:relative;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;cursor:pointer;border:2px solid transparent;transition:transform .15s;background:var(--c)}
  .ava:hover{transform:scale(1.25);z-index:2}
  .ava:after{content:'';position:absolute;left:50%;top:-5px;transform:translateX(-50%);width:3px;height:4px;background:var(--c);border-radius:2px}
  .ava.rs-done{border-color:var(--ok)} .ava.rs-active{border-color:#fff;animation:avapulse 1s infinite}
  .ava.rs-gate{border-color:var(--warn);animation:avapulse 1s infinite} .ava.rs-error{border-color:var(--err);animation:avapulse .5s infinite}
  .ava.rs-retry{border-color:var(--warn)} .ava.rs-stuck{border-color:#b9791a} .ava.rs-idle,.ava.rs-skip{opacity:.45}
  @keyframes avapulse{50%{box-shadow:0 0 0 4px rgba(255,255,255,.15)}}
  .avarow .cnt{font-size:12px;font-weight:800;color:var(--pdim);margin-left:4px;white-space:nowrap}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid #2a3345;border-radius:999px;
    padding:6px 13px;font-size:12.5px;font-weight:700;color:var(--pdim);white-space:nowrap}
  .pill b{color:var(--ptext)}
  .spacer{flex:1}
  .live{color:#ff7a5c;font-weight:800;font-size:11.5px;letter-spacing:.14em;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .live .blip{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:blink 1.1s infinite;box-shadow:0 0 8px var(--accent)}
  @keyframes blink{50%{opacity:.2}}

  /* ═════════════════════ ASOSIY QATOR ═════════════════════ */
  .main{flex:1;display:flex;gap:12px;padding:0 14px;min-height:0}

  /* ── BUILDING DIRECTORY (chap) ── */
  .dir{flex:0 0 248px;display:flex;flex-direction:column;background:linear-gradient(180deg,#20283a,#151b28);
    border:1px solid #2a3345;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .dir h2{margin:0;padding:13px 15px 11px;font-size:11px;letter-spacing:.2em;color:var(--gold);
    border-bottom:2px solid var(--gold2);background:rgba(233,185,73,.06);display:flex;align-items:center;gap:8px}
  .floors{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;scrollbar-width:thin}
  .fl{background:var(--panel2);border:1px solid #2a3345;border-radius:11px;padding:9px 11px;cursor:pointer;transition:.15s;position:relative}
  .fl:hover{border-color:#3d4a63;transform:translateX(2px)}
  .fl.sel{border-color:var(--gold);background:linear-gradient(180deg,#2a3040,#222939);box-shadow:0 0 0 1px rgba(233,185,73,.3)}
  .fl .fn{position:absolute;top:9px;right:10px;font-size:9.5px;font-weight:900;color:#5c688009;color:#5c6880;letter-spacing:.08em}
  .fl .ft{font-weight:800;font-size:13px;color:var(--ptext);display:flex;gap:6px;align-items:center;padding-right:44px}
  .fl .fid{font-size:10.5px;color:var(--pdim);margin-top:1px}
  .fl .fbar{height:5px;border-radius:4px;background:#0e1320;margin-top:7px;overflow:hidden}
  .fl .fbar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#FF7A2C,var(--accent));transition:width .5s}
  .fl .fchip{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:10px;font-weight:800;padding:2.5px 8px;border-radius:999px}
  .fc-active{background:rgba(255,79,40,.16);color:#ff8266} .fc-done{background:rgba(34,160,92,.18);color:#4fd08a}
  .fc-idle{background:#242d40;color:var(--pdim)} .fc-gate{background:rgba(245,166,35,.18);color:#f0b445}
  .fc-err{background:rgba(224,49,49,.2);color:#ff8080} .fc-here{font-size:9px;letter-spacing:.1em;color:var(--gold);margin-left:5px}
  .legend{padding:9px 13px 11px;border-top:1px solid #232c3e;display:flex;flex-wrap:wrap;gap:5px 10px}
  .lg{display:inline-flex;align-items:center;gap:5px;font-size:9.8px;font-weight:700;color:var(--pdim)}
  .lg i{width:8px;height:8px;border-radius:50%}

  /* ── OFIS SAHNASI ── */
  .viewport{flex:1;position:relative;min-width:0;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,#151b29,#10141f);border:1px solid #242e42;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .world{position:absolute;left:50%;top:50%;width:1600px;height:920px;transform-origin:center;transition:opacity .28s}
  .world.fading{opacity:0}
  .floorname{position:absolute;right:26px;bottom:20px;z-index:60;font-size:12px;font-weight:800;letter-spacing:.06em;
    color:#8d97ab;background:rgba(16,20,31,.72);border:1px solid #2a3345;border-radius:999px;padding:5px 14px;backdrop-filter:blur(3px)}

  /* pol va devorlar */
  .ground{position:absolute;inset:20px;background:
      linear-gradient(rgba(120,100,70,.07) 1px,transparent 1px),
      linear-gradient(90deg,rgba(120,100,70,.07) 1px,transparent 1px),
      linear-gradient(180deg,#f2ecdf, var(--floor) 55%,#e9e2d2);
    background-size:52px 52px,52px 52px,100% 100%;border-radius:10px;
    box-shadow:inset 0 0 90px rgba(90,70,40,.14)}
  .wall{position:absolute;background:linear-gradient(180deg,#39415a,var(--wall));box-shadow:0 3px 0 rgba(0,0,0,.25)}
  .wall.top{left:20px;right:20px;top:20px;height:26px;border-radius:10px 10px 0 0}
  .wall.left{left:20px;top:20px;bottom:20px;width:12px;border-radius:10px 0 0 10px}
  .wall.right{right:20px;top:20px;bottom:20px;width:12px;border-radius:0 10px 10px 0}
  .wall.bottom{left:20px;right:20px;bottom:20px;height:14px;border-radius:0 0 10px 10px}
  .window{position:absolute;top:24px;height:18px;width:74px;border-radius:5px;
    background:linear-gradient(180deg,#bfe3ff,#8ec7f5);box-shadow:inset 0 0 6px rgba(255,255,255,.8),0 0 12px rgba(140,200,255,.25)}

  /* ── zona (rol hududi) ── */
  .zone{position:absolute;border-radius:14px;transition:box-shadow .3s;background:var(--zc,transparent)}
  .zone .rug{position:absolute;inset:6px;border-radius:11px;opacity:.10;background:var(--c)}
  .zone.z-active{box-shadow:0 0 0 2px var(--c),0 0 34px -4px var(--c)}
  .zone.z-error{box-shadow:0 0 0 2px var(--err),0 0 34px -2px rgba(224,49,49,.7);animation:zerr 1s infinite}
  @keyframes zerr{50%{box-shadow:0 0 0 2px var(--err),0 0 10px -2px rgba(224,49,49,.3)}}
  .zone.flash{animation:zflash 1.4s}
  @keyframes zflash{0%,60%{box-shadow:0 0 0 3px var(--gold),0 0 40px -2px var(--gold)}100%{box-shadow:none}}
  .zlabel{position:absolute;left:50%;top:-13px;transform:translateX(-50%);z-index:40;display:inline-flex;align-items:center;gap:6px;
    background:#1a2230;color:#fff;border-radius:999px;padding:4px 12px;font-size:11.5px;font-weight:800;white-space:nowrap;
    box-shadow:0 5px 12px rgba(20,26,38,.35)}
  .zlabel .dot{width:7px;height:7px;border-radius:50%;background:var(--c)}
  .zlabel .zst{font-size:9px;font-weight:900;letter-spacing:.06em;padding:1.5px 7px;border-radius:999px;background:#2c3648;color:#9aa6bb}
  .z-active .zlabel{background:var(--accent)} .z-active .zlabel .zst{background:rgba(0,0,0,.25);color:#fff}
  .z-done .zlabel .zst{background:rgba(34,160,92,.35);color:#b7f0d0}
  .z-gate .zlabel .zst{background:rgba(245,166,35,.4);color:#ffe3a8}
  .z-error .zlabel{background:var(--err)} .z-error .zlabel .zst{background:rgba(0,0,0,.25);color:#fff}
  .z-retry .zlabel .zst{background:rgba(245,166,35,.4);color:#ffe3a8}
  .z-stuck .zlabel .zst{background:rgba(185,121,26,.45);color:#ffdf9e}
  .z-skip .zlabel{opacity:.55} .z-idle .zlabel{opacity:.72}

  /* ── mebel ── */
  .desk{position:absolute;width:116px;height:46px;border-radius:8px;
    background:linear-gradient(180deg,#d8b17e,var(--wood) 45%,var(--wood2));
    box-shadow:0 7px 0 -2px #8a6a3c,0 10px 12px rgba(90,60,20,.25)}
  .desk:before{content:'';position:absolute;inset:3px 3px auto 3px;height:10px;border-radius:5px;background:rgba(255,255,255,.22)}
  .monitor{position:absolute;left:50%;top:-26px;transform:translateX(-50%);width:44px;height:28px;border-radius:5px;
    background:#10151f;border:2px solid #2a3040;box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .monitor:after{content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:14px;height:5px;background:#2a3040;border-radius:0 0 4px 4px}
  .monitor .scr{position:absolute;inset:3px;border-radius:3px;overflow:hidden;background:#0c1017}
  .monitor .ln{position:absolute;left:3px;height:2px;border-radius:2px;background:rgba(120,235,255,.0)}
  .z-active .monitor .scr{background:#0e1a2c;box-shadow:inset 0 0 8px rgba(120,235,255,.5)}
  .z-active .monitor .ln{background:rgba(120,235,255,.75);animation:typeln 1.2s infinite}
  .z-active .monitor .ln:nth-child(2){top:8px;width:18px;animation-delay:.25s}
  .z-active .monitor .ln:nth-child(3){top:13px;width:24px;animation-delay:.5s}
  .monitor .ln:nth-child(1){top:3px;width:12px}
  @keyframes typeln{0%{opacity:.2;transform:scaleX(.3);transform-origin:left}60%{opacity:1;transform:scaleX(1)}100%{opacity:.6}}
  .z-done .monitor .scr{background:#0d1f14;box-shadow:inset 0 0 7px rgba(60,220,130,.45)}
  .z-error .monitor .scr{background:#2b0e10;box-shadow:inset 0 0 9px rgba(255,70,70,.6);animation:blink 1s infinite}
  .chair{position:absolute;width:30px;height:26px;border-radius:8px 8px 10px 10px;background:#4a5468;box-shadow:0 4px 0 -1px #333c4d}
  .chair:before{content:'';position:absolute;left:3px;right:3px;top:-9px;height:11px;border-radius:6px 6px 0 0;background:#3d4659}
  .bin{position:absolute;width:14px;height:18px;border-radius:3px 3px 5px 5px;background:#9aa4b5;box-shadow:inset 0 3px 0 #7f8a9c}
  .plant{position:absolute;font-size:26px;filter:drop-shadow(0 4px 3px rgba(0,0,0,.2))}
  .decor{position:absolute;font-size:20px;filter:drop-shadow(0 3px 3px rgba(0,0,0,.18))}
  .shelf{position:absolute;width:74px;height:30px;border-radius:5px;background:linear-gradient(180deg,#a5713d,#8a5c2f);
    box-shadow:0 4px 8px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:15px;letter-spacing:2px}
  .server{position:absolute;width:34px;height:64px;border-radius:5px;background:linear-gradient(180deg,#232a3a,#161c29);
    box-shadow:0 5px 10px rgba(0,0,0,.35);border:1px solid #333e55}
  .server i{position:absolute;left:5px;width:5px;height:5px;border-radius:50%;background:#41d67c;box-shadow:0 0 5px #41d67c;animation:blink 1.4s infinite}
  .server i:nth-child(2){top:14px;background:#ffce56;box-shadow:0 0 5px #ffce56;animation-delay:.4s}
  .server i:nth-child(3){top:24px;background:#ff6b6b;box-shadow:0 0 5px #ff6b6b;animation-delay:.8s}
  .server i:nth-child(1){top:4px}
  .server:after{content:'';position:absolute;right:5px;top:6px;bottom:6px;width:12px;border-radius:2px;
    background:repeating-linear-gradient(180deg,#2c3852 0 3px,#1a2233 3px 6px)}

  /* ── RESEPSHN ── */
  .reception{position:absolute;left:44px;top:52px;width:316px;height:206px}
  .rc-desk{position:absolute;left:26px;top:96px;width:200px;height:58px;border-radius:16px 16px 40px 40px/16px 16px 26px 26px;
    background:linear-gradient(180deg,#e8c68f,#c9a06c 50%,#a9814b);box-shadow:0 9px 0 -3px #7d6036,0 13px 16px rgba(90,60,20,.3)}
  .rc-desk:before{content:'';position:absolute;inset:4px 6px auto 6px;height:12px;border-radius:8px;background:rgba(255,255,255,.3)}
  .rc-sign{position:absolute;left:26px;top:30px;background:#1a2230;color:var(--gold);font-size:10.5px;font-weight:900;letter-spacing:.16em;
    padding:5px 12px;border-radius:7px;border:1px solid var(--gold2);box-shadow:0 4px 10px rgba(0,0,0,.3)}
  .rc-clock{position:absolute;right:16px;top:28px;background:#fff;border:2px solid #2b3140;border-radius:8px;padding:3px 9px;
    font-family:ui-monospace,monospace;font-size:12px;font-weight:800;color:#1a2230;box-shadow:0 3px 7px rgba(0,0,0,.2)}
  .rc-mat{position:absolute;left:96px;top:168px;width:74px;height:26px;border-radius:6px;background:#b8503a;opacity:.85;
    display:flex;align-items:center;justify-content:center;color:#ffe8de;font-size:8.5px;font-weight:900;letter-spacing:.18em}

  /* ── MAJLIS XONASI (human-gate) ── */
  .meet{position:absolute;left:44px;top:330px;width:376px;height:330px;border-radius:12px;
    background:linear-gradient(135deg,var(--glass),rgba(150,195,255,.05) 60%);
    border:3px solid var(--glassline);box-shadow:inset 0 0 30px rgba(140,190,255,.12)}
  .meet:before{content:'';position:absolute;inset:0;border-radius:9px;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.16) 38%,transparent 46%)}
  .meet .door{position:absolute;right:-5px;top:130px;width:7px;height:66px;border-radius:3px;background:var(--floor);
    box-shadow:inset 0 0 0 1px rgba(110,160,230,.3)}
  .meet .table{position:absolute;left:96px;top:106px;width:184px;height:104px;border-radius:26px;
    background:linear-gradient(180deg,#d8b17e,var(--wood) 55%,var(--wood2));box-shadow:0 8px 0 -3px #8a6a3c,0 12px 14px rgba(90,60,20,.25)}
  .meet .table:before{content:'';position:absolute;inset:5px;border-radius:20px;background:rgba(255,255,255,.15)}
  .meet .tv{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:#10151f;border:2px solid #2a3040;
    border-radius:7px;padding:5px 12px;font-size:10px;font-weight:900;letter-spacing:.1em;color:#5b6472;white-space:nowrap;box-shadow:0 4px 10px rgba(0,0,0,.3);
    max-width:340px;overflow:hidden;text-overflow:ellipsis}
  .meet.gate-on{border-color:var(--warn);box-shadow:inset 0 0 40px rgba(245,166,35,.2),0 0 30px -4px rgba(245,166,35,.5)}
  .meet.gate-on .tv{color:#ffd36e;border-color:#8a6a1a;animation:blink 1s infinite}
  .meet .mlabel{position:absolute;left:50%;top:-13px;transform:translateX(-50%);background:#1a2230;color:#fff;border-radius:999px;
    padding:4px 12px;font-size:11.5px;font-weight:800;white-space:nowrap;box-shadow:0 5px 12px rgba(20,26,38,.35);display:flex;gap:6px;align-items:center}
  .meet.gate-on .mlabel{background:var(--warn);color:#3a2a06}

  /* ── DAM OLISH ZONASI ── */
  .lounge-label{position:absolute;background:#1a2230;color:#fff;border-radius:999px;padding:4px 12px;font-size:11.5px;font-weight:800;
    white-space:nowrap;box-shadow:0 5px 12px rgba(20,26,38,.35);z-index:40}
  .counter{position:absolute;border-radius:8px;background:linear-gradient(180deg,#f2f4f8,#d9dde6);box-shadow:0 6px 0 -2px #aeb6c4,0 9px 11px rgba(40,50,70,.18)}
  .fridge{position:absolute;width:44px;height:76px;border-radius:8px;background:linear-gradient(180deg,#fdfdff,#dfe4ec);
    box-shadow:0 6px 0 -2px #a9b2c2,0 9px 11px rgba(40,50,70,.2)}
  .fridge:before{content:'';position:absolute;left:6px;top:26px;right:6px;height:2px;background:#b9c1cf}
  .fridge:after{content:'';position:absolute;left:8px;top:10px;width:3px;height:12px;border-radius:2px;background:#9aa4b5}
  .coffee{position:absolute;width:30px;height:36px;border-radius:6px;background:#3a4254;box-shadow:0 4px 8px rgba(0,0,0,.25)}
  .coffee:before{content:'☕';position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);font-size:14px}
  .cooler{position:absolute;width:22px;height:44px;border-radius:6px;background:#e7ecf3;box-shadow:0 4px 8px rgba(0,0,0,.2)}
  .cooler:before{content:'';position:absolute;left:4px;top:-12px;width:14px;height:16px;border-radius:4px;background:#8ec7f5;box-shadow:inset 0 0 4px rgba(255,255,255,.7)}
  .rtable{position:absolute;width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 40% 32%,#e2bd8a,var(--wood) 55%,var(--wood2));
    box-shadow:0 8px 0 -3px #8a6a3c,0 12px 14px rgba(90,60,20,.25)}
  .pong{position:absolute;width:170px;height:92px;border-radius:8px;background:linear-gradient(180deg,#27a468,#1d8a56);
    box-shadow:0 8px 0 -3px #14603c,0 11px 13px rgba(10,60,35,.3);border:3px solid #e9eef5}
  .pong:before{content:'';position:absolute;left:50%;top:-3px;bottom:-3px;width:4px;transform:translateX(-50%);background:#e9eef5;border-radius:2px;box-shadow:0 0 5px rgba(0,0,0,.2)}
  .pong:after{content:'';position:absolute;left:8px;right:8px;top:50%;height:2px;background:rgba(255,255,255,.55)}
  .pongball{position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(255,255,255,.8),0 3px 4px rgba(0,0,0,.25);
    opacity:0;z-index:35;transition:opacity .4s}
  .pongball.play{opacity:1;animation:pong-x 1.15s ease-in-out infinite alternate}
  @keyframes pong-x{0%{transform:translate(0,0)}25%{transform:translate(38px,-16px)}50%{transform:translate(76px,-2px)}75%{transform:translate(114px,-16px)}100%{transform:translate(152px,0)}}
  .sofa{position:absolute;width:88px;height:38px;border-radius:10px;background:linear-gradient(180deg,#e0885f,#c8663d);box-shadow:0 6px 0 -2px #92472a,0 9px 11px rgba(120,50,20,.25)}
  .sofa:before{content:'';position:absolute;left:0;right:0;top:-12px;height:16px;border-radius:8px 8px 0 0;background:#d3754b}
  .sofa:after{content:'';position:absolute;left:-8px;top:-8px;bottom:0;width:10px;border-radius:6px;background:#c8663d;box-shadow:96px 0 0 -2px #c8663d}

  /* ═════════════════════ ROBOT ═════════════════════ */
  .bot{position:absolute;width:150px;margin-left:-75px;display:flex;flex-direction:column;align-items:center;pointer-events:none}
  .cw{transform:scale(.74);transform-origin:bottom center;transition:transform .25s}
  .bot.walking .cw{animation:rock .5s ease-in-out infinite}
  @keyframes rock{0%,100%{transform:scale(.74) rotate(-3.5deg)}50%{transform:scale(.74) rotate(3.5deg)}}
  .char{position:relative;width:74px;height:98px;filter:drop-shadow(0 9px 9px rgba(20,26,38,.16))}
  .ant{position:absolute;left:50%;top:-10px;transform:translateX(-50%);width:4px;height:11px;background:var(--c);border-radius:3px}
  .ant:before{content:'';position:absolute;left:50%;top:-7px;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 8px var(--c)}
  .head{position:absolute;left:50%;top:6px;width:58px;height:46px;border-radius:16px;transform:translateX(-50%);background:var(--c)}
  .ear{position:absolute;top:20px;width:6px;height:14px;border-radius:4px;background:var(--c);filter:brightness(.88)}
  .ear.l{left:-4px}.ear.r{right:-4px}
  .screen{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:31px;border-radius:11px;background:#0f141e;overflow:hidden;box-shadow:inset 0 0 0 2px rgba(255,255,255,.08)}
  .eye{position:absolute;top:9px;width:9px;height:11px;background:#7ff0ff;border-radius:50%;box-shadow:0 0 7px rgba(120,235,255,.95);animation:eyeblink var(--bt,4.4s) infinite}
  .eye.l{left:9px}.eye.r{right:9px}
  @keyframes eyeblink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  .mouth{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);border-bottom:2.5px solid #7ff0ff;border-radius:0 0 30px 30px;box-shadow:0 1px 5px rgba(120,235,255,.5);width:15px;height:6px}
  .body{position:absolute;left:50%;top:54px;width:60px;height:44px;border-radius:15px 15px 17px 17px;transform:translateX(-50%);background:var(--c)}
  .arm{position:absolute;top:10px;width:9px;height:24px;border-radius:6px;background:var(--c);filter:brightness(.9)}
  .arm.l{left:-7px}.arm.r{right:-7px}
  .chest{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:17px;height:17px;border-radius:6px;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.55)}
  .shadowd{position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);width:52px;height:12px;border-radius:50%;background:rgba(20,26,38,.18);filter:blur(2px)}
  .nametag{margin-top:2px;display:inline-flex;align-items:center;gap:5px;background:#1a2230;color:#fff;border-radius:999px;
    padding:2.5px 9px;font-size:10.5px;font-weight:800;white-space:nowrap;box-shadow:0 4px 9px rgba(20,26,38,.28)}
  .nametag .rdot{width:6px;height:6px;border-radius:50%;background:var(--c)}
  .corner{position:absolute;top:-12px;right:-4px;font-size:17px;z-index:3;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2))}
  .work{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:15px;animation:spin 1.3s linear infinite;z-index:3}
  @keyframes spin{to{transform:translateX(-50%) rotate(360deg)}}
  .zzz{position:absolute;top:-20px;right:-8px;font-size:14px;opacity:0;animation:zzz 2.6s infinite;z-index:3}
  @keyframes zzz{0%{opacity:0;transform:translate(0,4px) scale(.6)}35%{opacity:1}100%{opacity:0;transform:translate(9px,-16px) scale(1.15)}}
  .mug{position:absolute;bottom:26px;right:-10px;font-size:14px;z-index:3;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}

  /* robot holatlari */
  .bot.idle{opacity:.55}
  .bot.idle .eye{background:#8794a5;box-shadow:none}
  .bot.idle .mouth{width:12px;height:4px}
  .bot.idle .chest{opacity:.45}
  .bot.skip{opacity:.38;filter:grayscale(.75)}
  .bot.skip .mouth{width:13px;height:0;border-bottom:none;border-top:2.5px solid #7ff0ff}
  .bot.skip .eye{background:#8794a5;box-shadow:none}
  .bot.done .mouth{width:18px;height:8px}
  .bot.done .chest{background:var(--ok);box-shadow:0 0 8px var(--ok);border-color:rgba(255,255,255,.6)}
  .bot.active .cw{transform:scale(.84)}
  .bot.active.walking .cw{animation:rockA .5s ease-in-out infinite}
  @keyframes rockA{0%,100%{transform:scale(.84) rotate(-3.5deg)}50%{transform:scale(.84) rotate(3.5deg)}}
  .bot.active .char{animation:bob .9s ease-in-out infinite;--bt:1.7s}
  .bot.active .mouth{width:21px;height:10px}
  .bot.active .chest{background:#fff;box-shadow:0 0 12px #fff;animation:chest 1s infinite}
  .bot.active .nametag{background:var(--accent)}
  .bot.active .char:before{content:'';position:absolute;left:50%;top:16px;transform:translateX(-50%);width:86px;height:86px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,79,40,.28),transparent 68%);animation:pulse 1.4s ease-out infinite;z-index:-1}
  @keyframes bob{50%{transform:translateY(-8px)}}
  @keyframes pulse{0%{transform:translateX(-50%) scale(.6);opacity:.9}100%{transform:translateX(-50%) scale(1.4);opacity:0}}
  @keyframes chest{50%{opacity:.4}}
  .bot.gate .cw{transform:scale(.8)}
  .bot.gate .mouth{width:13px;height:0;border-bottom:none;border-top:2.5px solid #7ff0ff}
  .bot.gate .chest{background:var(--warn);box-shadow:0 0 10px var(--warn);animation:chest 1s infinite}
  .bot.gate .nametag{background:var(--warn);color:#3a2a06}
  .bot.error .char{animation:shake .4s infinite}
  @keyframes shake{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  .bot.error .eye{background:#ff6b6b;box-shadow:0 0 7px rgba(255,80,80,.95)}
  .bot.error .mouth{width:16px;height:6px;border-bottom:none;border-top:2.5px solid #ff6b6b;border-radius:30px 30px 0 0}
  .bot.error .chest{background:#ff5a5a;box-shadow:0 0 12px #ff5a5a;animation:chest .7s infinite}
  .bot.error .nametag{background:var(--err)}
  .bot.retry .char{animation:bob .9s ease-in-out infinite}
  .bot.retry .eye{background:#ffd36e;box-shadow:0 0 6px rgba(255,190,60,.9)}
  .bot.retry .chest{background:var(--warn);box-shadow:0 0 10px var(--warn);animation:chest 1s infinite}
  .bot.retry .nametag{background:var(--warn);color:#3a2a06}
  .bot.stuck .char{animation:bob 2.6s ease-in-out infinite}
  .bot.stuck .eye{background:#ffce56;box-shadow:0 0 6px rgba(255,190,60,.8);animation:eyeblink 1.1s infinite}
  .bot.stuck .chest{background:var(--warn);animation:chest 1.7s infinite}
  .bot.stuck .nametag{background:#b9791a}

  /* gap pufakchasi */
  .bub{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(.85);transform-origin:bottom center;
    background:#141a26;color:#f2f5fa;border-radius:12px;padding:8px 12px;font-size:11.5px;font-weight:600;line-height:1.4;
    width:max-content;max-width:230px;text-align:left;box-shadow:0 9px 22px rgba(0,0,0,.4);opacity:0;transition:.22s;z-index:50;pointer-events:none;
    border:1px solid rgba(255,255,255,.09)}
  .bub:after{content:'';position:absolute;left:50%;top:100%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#141a26}
  .bub.show{opacity:1;transform:translateX(-50%) scale(1)}
  .bub .bwho{display:block;font-size:9px;font-weight:900;letter-spacing:.09em;margin-bottom:3px;color:var(--c,#ffb49e);opacity:.95}
  .bub.b-gate{background:#3a2c08;border-color:#8a6a1a}.bub.b-gate:after{border-top-color:#3a2c08}
  .bub.b-error{background:#3a1010;border-color:#7c2222}.bub.b-error:after{border-top-color:#3a1010}

  /* direktor pufagi (narrator) */
  .bub.director{max-width:290px;font-size:12px}

  /* ── alert banner (sahna ustida) ── */
  .alert{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:80;display:none;align-items:center;gap:11px;
    border-radius:12px;padding:10px 18px;font-weight:800;font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.45);max-width:78%}
  .alert.show{display:flex;animation:drop .3s}
  .alert.err{background:#fff0f0;border:1px solid #ffb4b4;color:#c92a2a}
  .alert.warn{background:#fff8e8;border:1px solid #ffdf9e;color:#a9701a}
  @keyframes drop{from{transform:translate(-50%,-9px);opacity:0}}

  /* ── konfetti ── */
  .cf{position:absolute;width:9px;height:13px;border-radius:2px;z-index:90;animation:cfall linear forwards}
  @keyframes cfall{0%{transform:translateY(-30px) rotate(0)}100%{transform:translateY(960px) rotate(720deg);opacity:.2}}

  /* ═════════════════════ EVENT LOG (past) ═════════════════════ */
  .elog{flex:0 0 auto;margin:10px 14px 12px;background:#12161f;border:1px solid #262f42;border-radius:13px;overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column}
  .elog .ehead{display:flex;align-items:center;gap:10px;padding:8px 14px}
  .elog .etitle{font-size:10px;font-weight:900;letter-spacing:.18em;color:#6d7890}
  .elog .elast{flex:1;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;color:#c4cddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ebtn{background:#1d2434;border:1px solid #2d3850;color:#98a3b8;font-size:10px;font-weight:800;letter-spacing:.06em;
    border-radius:7px;padding:4px 11px;cursor:pointer;transition:.15s}
  .ebtn:hover{background:#273047;color:#dfe6f2}
  .elist{display:none;max-height:150px;overflow-y:auto;border-top:1px solid #232c3e;padding:7px 14px;scrollbar-width:thin}
  .elog.open .elist{display:block}
  .eline{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#9aa6bb;padding:2.5px 0;border-bottom:1px dashed #1d2434}
  .eline b{color:#d7deeb;font-weight:700}
  .eline .et{color:#5c6880;margin-right:8px}
  .eline.ee b{color:#ff8080} .eline.eg b{color:#f0b445} .eline.ed b{color:#4fd08a}

  /* ═════ F1: bildirishnoma qo'ng'irog'i ═════ */
  .bell{font-size:14px;padding:5px 11px;border-radius:999px}
  .bell.on{background:rgba(233,185,73,.16);border-color:var(--gold2);color:var(--gold)}

  /* ═════ F2: uchuvchi handoff-hujjat ═════ */
  .flydoc{position:absolute;left:0;top:0;font-size:30px;z-index:150;pointer-events:none;filter:drop-shadow(0 6px 8px rgba(0,0,0,.32))}

  /* ═════ F3: SHTAB displeyi ═════ */
  .btv{position:absolute;left:84px;top:664px;width:302px;height:98px;border-radius:11px;background:#10151f;border:3px solid #2a3040;
    box-shadow:0 9px 20px rgba(0,0,0,.38),inset 0 0 20px rgba(120,235,255,.08);padding:9px 13px;z-index:5}
  .btv .bh{font-size:10px;font-weight:900;letter-spacing:.15em;color:#7ff0ff;opacity:.85;margin-bottom:6px}
  .btv .bl{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:#c4cddd;margin-top:4px}
  .btv .bbar{flex:1;height:7px;border-radius:5px;background:#1d2534;overflow:hidden}
  .btv .bbar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#22A05C,#7ff0ff);transition:width .6s}
  .btv .bnow{font-size:10px;color:#8d97ab;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ═════ F4: robot kartasi ═════ */
  .bot .cw,.bot .nametag{pointer-events:auto;cursor:pointer}
  .rcard{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);width:252px;background:#141a26;border:1px solid #2e3a52;
    border-radius:13px;padding:11px 13px;z-index:160;box-shadow:0 14px 34px rgba(0,0,0,.55);pointer-events:auto;text-align:left;cursor:default}
  .rcard h4{margin:0 0 4px;font-size:13px;color:#fff;display:flex;align-items:center;gap:6px}
  .rcard .rd{font-size:10.5px;color:#98a3b8;line-height:1.45;margin-bottom:6px}
  .rcard .rs{display:inline-block;font-size:9.5px;font-weight:900;letter-spacing:.06em;padding:2px 8px;border-radius:999px;background:#232c3e;color:#c4cddd;margin-right:5px}
  .rcard .rn{font-size:10.5px;color:#ffd9a8;margin-top:5px;font-style:italic}
  .rcard .rl{margin-top:6px;border-top:1px dashed #2a3345;padding-top:5px;font-family:ui-monospace,monospace;font-size:9px;color:#7d8799;line-height:1.55;word-break:break-word}
  .rcard .rx{position:absolute;top:6px;right:9px;cursor:pointer;color:#5c6880;font-size:12px;font-weight:900}
  .rcard .rx:hover{color:#fff}
  .rcard.below{bottom:auto;top:calc(100% + 6px)}

  /* ═════ F6: mikro-hayot ═════ */
  .bot.stretch .cw{animation:stretch 1.25s ease-in-out}
  @keyframes stretch{30%{transform:scale(.74) rotate(-7deg) translateY(-5px)}60%{transform:scale(.8,.66)}80%{transform:scale(.72,.78)}}

  /* ═════ F7: tun rejimi ═════ */
  body.night .ground{background:
      linear-gradient(rgba(90,110,170,.09) 1px,transparent 1px),
      linear-gradient(90deg,rgba(90,110,170,.09) 1px,transparent 1px),
      linear-gradient(180deg,#333b52,#2a3143 55%,#232939);
    box-shadow:inset 0 0 130px rgba(5,8,18,.55)}
  body.night .window{background:linear-gradient(180deg,#16233f,#0b1426);box-shadow:inset 0 0 5px rgba(150,180,255,.3)}
  body.night .window:after{content:'✦ · ˚ ✧ ·';font-size:7px;color:#cdd9ff;position:absolute;left:7px;top:4px;letter-spacing:3px;opacity:.85}
  .lamp{position:absolute;width:270px;height:270px;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .9s;
    background:radial-gradient(circle,rgba(255,224,150,.17),transparent 64%)}
  body.night .lamp{opacity:1}
  body.night .meet{box-shadow:inset 0 0 30px rgba(140,190,255,.2)}
  body.night .zlabel,body.night .lounge-label,body.night .nametag{box-shadow:0 5px 13px rgba(0,0,0,.65)}

  /* ═════ F8: lift ═════ */
  .lift{position:absolute;inset:0;z-index:300;pointer-events:none}
  .lp{position:absolute;top:0;bottom:0;width:50.4%;background:linear-gradient(90deg,#232b3d,#1a2130);transition:transform .42s cubic-bezier(.5,0,.3,1);
    box-shadow:inset 0 0 44px rgba(0,0,0,.5)}
  .lp.l{left:0;transform:translateX(-102%);border-right:3px solid var(--gold2)}
  .lp.r{right:0;transform:translateX(102%);border-left:3px solid var(--gold2)}
  .lift.closed .lp{transform:translateX(0)}
  .lnum{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;letter-spacing:.2em;color:var(--gold);
    opacity:0;transition:opacity .22s;text-shadow:0 2px 14px rgba(0,0,0,.85);z-index:2;white-space:nowrap}
  .lift.closed .lnum{opacity:1}

  /* ═════ V2: JONLI eskirgan-holat ═════ */
  .live.stale{color:#8d97ab}
  .live.stale .blip{background:#5c6880;animation:none;box-shadow:none}

  /* ═════ V9: teng nusxalar — ×N klon-badge ═════ */
  .nametag .xn{background:var(--gold);color:#3a2a06;border-radius:6px;padding:0 5px;
    font-size:9px;font-weight:900;margin-left:3px;display:none;box-shadow:0 0 6px rgba(233,185,73,.5)}

  /* ═════ V2: QA qaytargan qizil hujjat ═════ */
  .flydoc.red{filter:drop-shadow(0 0 8px rgba(224,49,49,.85))}

  /* ═════ V2: LOYIHA STENDI (qavat kartasi) ═════ */
  .stend{position:absolute;right:14px;top:14px;width:262px;z-index:75;display:none;
    background:#141a26;border:1px solid #2e3a52;border-radius:14px;padding:13px 15px;
    box-shadow:0 16px 40px rgba(0,0,0,.6)}
  .stend.open{display:block;animation:drop .25s}
  .stend h3{margin:0 0 3px;font-size:13.5px;color:#fff}
  .stend .stid{font-size:10.5px;color:#8d97ab;margin-bottom:4px}
  .stend .strow{display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:#c4cddd;padding:3.5px 0;border-bottom:1px dashed #232c3e}
  .stend .stchip{font-size:9px;font-weight:900;letter-spacing:.04em;padding:1.5px 8px;border-radius:999px;background:#232c3e;color:#9aa6bb}
  .stend .st-done{color:#4fd08a;background:rgba(34,160,92,.15)}
  .stend .st-active{color:#ff8266;background:rgba(255,79,40,.16)}
  .stend .st-gate{color:#f0b445;background:rgba(245,166,35,.16)}
  .stend .st-error{color:#ff8080;background:rgba(224,49,49,.18)}
  .stend .st-retry,.stend .st-stuck{color:#ffd36e;background:rgba(245,166,35,.12)}
  .stend .stnarr{margin-top:8px;font-size:10.5px;color:#ffd9a8;font-style:italic;line-height:1.45}
  .stend .stx{position:absolute;top:8px;right:11px;cursor:pointer;color:#5c6880;font-size:13px;font-weight:900}
  .stend .stx:hover{color:#fff}

  /* ═════ V5: QAVAT IDENTITETI ═════ */
  .wallsign{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:45;background:#1a2230;
    border:1px solid var(--gold2);color:var(--gold);font-weight:900;letter-spacing:.12em;font-size:14px;
    padding:6px 20px;border-radius:9px;box-shadow:0 6px 16px rgba(0,0,0,.45);white-space:nowrap;max-width:560px;overflow:hidden;text-overflow:ellipsis}
  .ftint{position:absolute;inset:20px;border-radius:10px;pointer-events:none;opacity:.08;z-index:1;transition:background .5s}

  /* ═════ V5: SHTAB KAMERALARI — boshqa qavatlardagi jonli ish ═════ */
  .cams{position:absolute;left:12px;top:60px;z-index:72;display:flex;flex-direction:column;gap:7px;max-width:280px}
  .cam{display:flex;align-items:center;gap:7px;background:rgba(20,26,38,.85);border:1px solid #2e3a52;border-radius:11px;
    padding:7px 11px;cursor:pointer;backdrop-filter:blur(3px);transition:.15s;font-size:11px;font-weight:700;color:#c4cddd;line-height:1.35}
  .cam:hover{border-color:var(--gold2);transform:translateX(3px)}
  .cam .cdot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1.1s infinite;flex:0 0 auto;box-shadow:0 0 6px var(--accent)}
  .cam.gatecam .cdot{background:var(--warn);box-shadow:0 0 6px var(--warn)}
  .cam small{color:#8d97ab;font-weight:600}
  .cam b{color:#fff}

  /* ═════ V12: BINO → QAVAT → XONA sahnalari ═════ */
  .scene{position:absolute;inset:0;z-index:50;display:none;overflow:auto;scrollbar-width:thin;
    background:linear-gradient(180deg,#151b29,#10141f)}
  .scene.on{display:flex;animation:scfade .28s}
  @keyframes scfade{from{opacity:0}}

  /* — breadcrumb (Bino › qavat › xona) — */
  .crumbs{position:absolute;left:12px;top:12px;z-index:90;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .crumb{background:rgba(20,26,38,.88);border:1px solid #2e3a52;color:#c4cddd;border-radius:999px;padding:5px 13px;
    font-size:11.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;backdrop-filter:blur(3px)}
  .crumb:hover,.crumb:focus-visible{border-color:var(--gold2);color:#fff}
  .crumb.cur{border-color:var(--mc,var(--gold2));color:#fff}
  .crumbsep{color:#5c6880;font-weight:900}

  /* — BINO ko'rinishi: 3 qavatli kesim — */
  #bview{align-items:center;justify-content:center;padding:46px 20px 26px}
  .bldg{width:min(820px,94%);margin:auto;display:flex;flex-direction:column;filter:drop-shadow(0 26px 46px rgba(0,0,0,.55))}
  .broof{height:40px;background:linear-gradient(180deg,#39415a,#2b3140);border-radius:16px 16px 0 0;display:flex;align-items:center;
    justify-content:center;gap:9px;color:var(--gold);font-weight:900;letter-spacing:.26em;font-size:13px;
    border:2px solid var(--gold2);border-bottom:none;text-shadow:0 1px 0 #000}
  .bfl{display:flex;align-items:center;gap:16px;padding:15px 20px;width:100%;
    background:linear-gradient(180deg,#f2ecdf,#e7e0d2);border:2px solid #b8ad97;border-top:1px solid #cfc5ae;
    cursor:pointer;text-align:left;font-family:inherit;position:relative;transition:.15s}
  .bfl:hover,.bfl:focus-visible{background:linear-gradient(180deg,#fff8ea,#efe6d2);z-index:2;outline:2px solid var(--gold);outline-offset:-2px}
  .btag{flex:0 0 auto;background:var(--mc);color:#fff;font-weight:900;font-size:11px;letter-spacing:.12em;
    padding:7px 11px;border-radius:9px;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  .bmid{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .bname{font-weight:900;font-size:15.5px;color:var(--ink)}
  .bstats{display:flex;align-items:center;gap:11px;font-size:11px;font-weight:800;color:#6b6250;flex-wrap:wrap}
  .bpb{flex:0 0 150px;height:7px;border-radius:5px;background:rgba(60,50,30,.15);overflow:hidden}
  .bpb i{display:block;height:100%;background:var(--mc);border-radius:5px;transition:width .5s}
  .blive{display:inline-flex;align-items:center;gap:5px;color:#c2410c;white-space:nowrap}

const inRoom=p=>p.x<452&&p.y>300&&p.y<690;
function routeTo(b,dest){
  const wp=[];
  const from={x:b.x,y:b.y};
  if(inRoom(dest)&&!inRoom(from)){                  /* tashqaridan majlisga */
    wp.push({x:DOOR.x,y:from.y},{x:DOOR.x,y:DOOR.y},DOOR_IN,dest);
  }else if(!inRoom(dest)&&inRoom(from)){            /* majlisdan chiqish */
    wp.push(DOOR_IN,{x:DOOR.x,y:DOOR.y},{x:DOOR.x,y:dest.y},dest);
  }else{
    wp.push({x:dest.x,y:from.y},dest);
  }
  b.wp=wp;
}

/* ── harakat sikli ── */
let lastT=performance.now();
function tick(t){
  const dt=Math.min(50,t-lastT)/1000; lastT=t;
  const all=bots.concat([director]);
  for(const b of all){
    if(!b.wp.length){ if(b.el.classList.contains('walking'))b.el.classList.remove('walking'); continue; }
    const tg=b.wp[0], dx=tg.x-b.x, dy=tg.y-b.y, d=Math.hypot(dx,dy), sp=185*dt;
    if(d<=sp){ b.x=tg.x; b.y=tg.y; b.wp.shift(); }
    else { b.x+=dx/d*sp; b.y+=dy/d*sp; }
    if(!b.el.classList.contains('walking'))b.el.classList.add('walking');
    drawBot(b);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* V2: har robot uchun manzil — gate=majlis · done=dam(bayram) · idle=dam(kutish),
   FAQAT navbati yaqin (birinchi idle) stolida tayyorgarlik ko'radi.
   V7: xodim REAL ishlayotgan bo'lsa (istalgan qavatda) — DOIM stolida (tennis yo'q!) */
let globalRuns=[];
function destsFor(st){
  let gateN=0,restN=0;
  const doneIdx=[]; st.forEach((s,i)=>{if(s.status==='done')doneIdx.push(i);});
  const firstIdle=st.findIndex(s=>s.status==='idle');
  return st.map((s,i)=>{
    if(s.status==='gate')return MEET_SEATS[Math.min(gateN++,MEET_SEATS.length-1)];
    if(s.status==='done')return LOUNGE[doneIdx.indexOf(i)%LOUNGE.length];
    if((s.status==='idle'&&i!==firstIdle)||s.status==='skip')return REST[restN++%REST.length];
    return deskSpot(i);
  });
}
function applyBots(st){
  const dests=destsFor(st);
  const firstIdle=st.findIndex(s=>s.status==='idle');
  const doneIdx=[]; st.forEach((s,i)=>{if(s.status==='done')doneIdx.push(i);});
  st.forEach((s,i)=>{
    const b=bots[i];
    const dest=dests[i];
    /* V9: TENG NUSXALAR — rol bir vaqtda N qavatda to'la nusxalarda ishlaydi.
       Har qavat o'z holatini halol ko'rsatadi (yashirish/sharpa YO'Q).
       ×N badge — nechta nusxa parallel ishlayotganini bildiradi. */
    const nRun=globalRuns.filter(r=>r.role===i).length;
    if(b.xn){ b.xn.textContent='×'+nRun; b.xn.style.display=nRun>1?'':'none'; }
    if(!b.excursion && (b.status!==s.status || b.destKey!==dest.x+':'+dest.y)){
      routeTo(b,dest); b.destKey=dest.x+':'+dest.y;
    }
    if(b.status!==s.status){
      STATUSES.forEach(c=>b.el.classList.remove(c));
      b.el.classList.add(s.status);
      b.status=s.status; b.since=Date.now(); b.warned=false;
    }
    /* piktogramma va pufakcha */
    b.work.style.display = s.status==='active'?'':'none';
    b.zzz.style.display  = (s.status==='stuck'||(s.status==='idle'&&i!==firstIdle))?'':'none';
    const co=CORNER[s.status]; b.corner.style.display=co?'':'none'; if(co)b.corner.textContent=co;
    const doneSpot = s.status==='done' ? LOUNGE[doneIdx.indexOf(i)%LOUNGE.length] : null;
    b.mug.style.display = (doneSpot&&doneSpot.mug)?'':'none';
    const nextUp = s.status==='idle'&&i===firstIdle;
    const talk = ['active','gate','error','retry','stuck'].includes(s.status)||nextUp;
    if(talk){ b.btxt.textContent = s.note || (nextUp?"📋 Navbatim yaqin — tayyorlanyapman":DEFTEXT[s.status]) || '';
      b.lastNote = s.note || '';
      b.bub.classList.add('show');
      b.bub.classList.toggle('b-gate',s.status==='gate'||s.status==='retry'||s.status==='stuck');
      b.bub.classList.toggle('b-error',s.status==='error');
    } else if(!(b.chatterUntil>Date.now())) b.bub.classList.remove('show');
    /* zona ko'rinishi */
    const z=$('#zone-'+i);
    z.className='zone z-'+s.status;
    const zst=$('#zst-'+i); if(zst)zst.textContent=STLABEL[s.status];
  });
  /* majlis xonasi holati — TV'da HAQIQIY gate-savoli (hook uzatadi) */
  const anyGate=st.some(s=>s.status==='gate');
  $('#meet').classList.toggle('gate-on',anyGate);
  $('#meetTv').textContent=anyGate?(gateQ?('🚦 '+gateQ):'🚦 TASDIQ KUTILMOQDA'):'EKRAN: BO\'SH';
  $('#meetTv').title=anyGate?gateQ:'';
  /* ping-pong: ikkala pong-joy band bo'lsa — to'p o'ynaydi */
  const pongBusy=bots.filter(b=>b.status==='done'&&!b.wp.length&&
    ((Math.abs(b.x-PONG_A.x)<6&&Math.abs(b.y-PONG_A.y)<6)||(Math.abs(b.x-PONG_B.x)<6&&Math.abs(b.y-PONG_B.y)<6))).length;
  $('#pongball').classList.toggle('play',pongBusy>=2);

  /* F5: direktor yuradi — joriy bosqich qayerda bo'lsa, o'sha yerga boradi */
  const dcs=curStage(st);
  let dd;
  if(!dcs) dd = progressOf(st).complete ? {x:1352,y:236} : {x:DIRECTOR.x,y:DIRECTOR.y};  /* hammasi tayyor → oshxonada; aks holda qabulxonada */
  else if(dcs.status==='gate') dd={x:336,y:614};                                          /* gate → majlis xonasida siz bilan kutadi */
  else {const z=ZONES[dcs.i]; dd={x:z.x+36,y:z.y+216};}                                   /* ishlayotgan rol zonasida nazorat */
  const dk=dd.x+':'+dd.y;
  if(director.destKey!==dk){routeTo(director,dd);director.destKey=dk;}
}

let soundOn=localStorage.getItem('hqSound')==='1';
function updSoundBtn(){const b=$('#sound');if(!b)return;b.textContent=soundOn?'🔊':'🔇';b.classList.toggle('on',soundOn);}
function beep(kind){
  if(!soundOn)return;
  try{
    const C=window.__ac||(window.__ac=new (window.AudioContext||window.webkitAudioContext)());
    if(C.state==='suspended')C.resume();
    const t=C.currentTime;
    const tones=kind==='error'?[[196,0,.28],[147,.26,.34]]:[[880,0,.13],[1174.7,.15,.2]];
    tones.forEach(([f,off,dur])=>{
      const o=C.createOscillator(),g=C.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.0001,t+off);
      g.gain.exponentialRampToValueAtTime(kind==='error'?.09:.12,t+off+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+off+dur);
      o.connect(g);g.connect(C.destination);
      o.start(t+off);o.stop(t+off+dur+.05);
    });
  }catch(e){}
}
$('#sound').onclick=()=>{soundOn=!soundOn;localStorage.setItem('hqSound',soundOn?'1':'0');updSoundBtn();if(soundOn)beep('gate');};

/* ════════ RENDER (poll'da chaqiriladi) ════════ */
let prevActive=null;
function liveRuns(LV){
  if(!LV||!LV.running)return [];
  const r=LV.running;
  const map=(typeof r==='object'&&!('role' in r))?r:{_:r};   /* v2 bitta-obyekt bilan moslik */
  return Object.values(map).filter(x=>x&&ROLES[x.role]&&(Date.now()/1000-x.since)<7200);
}
function render(){
  const P=window.PIPELINE; if(!P)return;
  const LV=(window.PIPELINE_LIVE&&window.PIPELINE_LIVE.v>=2)?window.PIPELINE_LIVE:null;
  $('#model').textContent=P.model||'—';
  updateFreshness();
  const clock=$('#clock'); if(clock)clock.textContent=(LV&&LV.updated)||P.updated||'--:--';
  /* V2: JONLI holat (hook yozadi) statik reja USTIGA qo'yiladi — qo'lda yangilash yo'q */
  P.lessons.forEach(l=>{
    const lv=LV&&LV.lessons&&LV.lessons[l.id];
    l._st=stagesOf({s:(lv&&lv.s)||l.s,n:l.n});
  });
  /* V3: PARALLEL ishlar — har qavatda o'z smenasi ishlashi mumkin (1-qoida: turli fayl) */
  const runs=liveRuns(LV);
  /* V8/V12: away-belgisi uchun qavat·xona yorlig'i/ikonkasini boyitamiz */
  runs.forEach(r=>{const rl=P.lessons.find(x=>x.id===r.lesson);
    if(rl){const ri=roomInfo(P,rl);r._mod=ri.mod;r._rn=ri.no;r._lbl=ri.mod+'-qavat '+ri.no+'-xona';r._icon=rl.icon||'';}
    else{r._lbl=null;r._icon='';}});
  globalRuns=runs;
  runs.forEach(r=>{
    const rl=P.lessons.find(x=>x.id===r.lesson);
    if(rl&&rl._st[r.role]&&rl._st[r.role].status!=='active')
      rl._st[r.role]={status:'active',note:rl._st[r.role].note||''};
  });
  gateQ=(LV&&LV.gate&&LV.gate.q)||'';
  if(LV&&LV.gate&&LV.lastDone){
    const gl=P.lessons.find(x=>x.id===LV.lastDone.lesson)||P.lessons.find(x=>x.id===LV.activeLesson);
    if(gl&&gl._st[LV.lastDone.role]&&gl._st[LV.lastDone.role].status==='done')
      gl._st[LV.lastDone.role]={status:'gate',note:'Ishimni taqdim etyapman — tasdiq sizda 🙏'};
  }
  /* V4: XATO-RADAR — hook PostToolUseFailure'dan kelgan E allaqachon s-satrda; lastError eslatma */
  if(LV&&LV.lastError&&(Date.now()/1000-LV.lastError.at)<7200){
    const el2=P.lessons.find(x=>x.id===LV.lastError.lesson);
    if(el2&&el2._st[LV.lastError.role]&&el2._st[LV.lastError.role].status==='error'&&!el2._st[LV.lastError.role].note)
      el2._st[LV.lastError.role]={status:'error',note:'Agent buzilib tugadi — qayta yuritish kerak 💥'};
  }
  /* V3: kamera qavati — FOLLOW: eng oxirgi faollik · PIN: siz tanlagan */
  const followTarget=(LV&&LV.activeLesson&&P.lessons.some(l=>l.id===LV.activeLesson))?LV.activeLesson
    :(P.activeLesson&&P.lessons.some(l=>l.id===P.activeLesson))?P.activeLesson
    :((P.lessons.find(l=>curStage(l._st))||P.lessons[0]).id);
  const pinned=localStorage.getItem('hqRoom')||localStorage.getItem('hqFloor');  /* eski kalitga fallback */
  const ACTIVE=(!FOLLOW&&pinned&&P.lessons.some(l=>l.id===pinned))?pinned:followTarget;
  /* V13.2: foydalanuvchi hozir boshqarayotgan bo'lsa (30s) kamera unga bo'ysunadi;
     FOLLOW avto-sakrashi debounce (10s) — parallel partiyada lift tinimsiz yurmasin */
  const _now=Date.now();
  const navHold=_now-userNavTs<30000;
  if(prevActive&&prevActive!==ACTIVE&&!firstLoad&&VIEW==='room'&&FOLLOW&&!navHold&&_now-lastAutoJump>10000){
    /* kamera xonada: modul o'zgarsa — lift, aks holda yumshoq fade */
    lastAutoJump=_now;
    const pl=P.lessons.find(x=>x.id===prevActive), nl=P.lessons.find(x=>x.id===ACTIVE);
    const cross=!pl||!nl||(pl.module||1)!==(nl.module||1);
    prevActive=ACTIVE;SELECTED=ACTIVE;if(nl)CUR_MOD=nl.module||1;viewSave();
    if(cross)liftTo(ACTIVE);else fadeTo(ACTIVE);
    return;
  }
  prevActive=ACTIVE;
  if(!SELECTED||!P.lessons.some(l=>l.id===SELECTED)||(!navHold&&FOLLOW)||(!FOLLOW&&ACTIVE===pinned&&!navHold)) SELECTED=ACTIVE;
  {const sl=P.lessons.find(x=>x.id===SELECTED); if(sl&&VIEW==='room')CUR_MOD=sl.module||1;}

  /* — event log diff (barcha darslar bo'yicha) + handoff + QA-qaytarish + bildirishnoma — */
  const handoff=[], qaBack=[];
  P.lessons.forEach(l=>{
    l._st.forEach((s,i)=>{
      const key=l.id+':'+i, prev=prevStatus[key];
      if(prev!==undefined&&prev!==s.status&&!firstLoad){
        const kind=s.status==='error'?'error':s.status==='gate'?'gate':s.status==='done'?'done':'';
        pushLog(kind,`${l.title} · ${ROLES[i].emoji} ${RNAME(ROLES[i])}: ${STLABEL[prev]||prev} → ${STLABEL[s.status]}`+(s.note?` — ${s.note}`:''));
        if(kind==='gate'||kind==='error'){notify(`${l.title}: ${RNAME(ROLES[i])} — ${STLABEL[s.status]}`);beep(kind);}
        if(l.id===SELECTED&&s.status==='done') handoff.push(i);
        /* V2: tayyor rol QAYTA ishga tushdi = QA nuqson qaytardi — qizil hujjat */
        if(l.id===SELECTED&&prev==='done'&&s.status==='active'&&i!==7) qaBack.push(i);
      }
      prevStatus[key]=s.status;
    });
  });

  /* — alert (error > gate > stuck) — */
  const al=$('#alert'); let a=P.alert;
  if(!a){
    const pick=k=>P.lessons.find(l=>l._st.some(s=>s.status===k));
    const eL=pick('error'),gL=pick('gate'),sL=pick('stuck');
    if(eL){const s=eL._st.find(x=>x.status==='error'),ri=eL._st.indexOf(s);
      a={level:'err',text:`${eL.title}: ${RNAME(ROLES[ri])} — esbuild sindi, pipeline to'xtadi. Tuzatish kerak.`};}
    else if(gL){const s=gL._st.find(x=>x.status==='gate'),ri=gL._st.indexOf(s);
      a={level:'warn',text:`${gL.title}: ${RNAME(ROLES[ri])} tasdiq xonasida — sizning qaroringiz kutilmoqda.`};}
    else if(sL){const s=sL._st.find(x=>x.status==='stuck'),ri=sL._st.indexOf(s);
      a={level:'warn',text:`${sL.title}: ${RNAME(ROLES[ri])} — uzoq cho'zildi, tekshiring.`};}
  }
  if(a){al.className='alert show '+(a.level==='err'?'err':'warn');
    al.innerHTML=`<span style="font-size:17px">${a.level==='err'?'⚠️':'🚦'}</span>${a.text}`;
    setAttention(true,a.text,a.level==='err');}
  else{al.className='alert';setAttention(false);}

  /* — Building Directory (V12: qavat → xona iyerarxiyasi) — */
  const fls=$('#floors'); fls.innerHTML='';
  getMods(P).forEach(M=>{
    const ls=modLessons(P,M.m);
    const ready=ls.filter(l=>progressOf(l._st).complete).length;
    const mruns=runs.filter(r=>{const rl=P.lessons.find(x=>x.id===r.lesson);return rl&&(rl.module||1)===M.m;});
    const dopen=DIR_OPEN.has(M.m);
    const mh=document.createElement('button');
    mh.className='dirmod'+(dopen?' open':''); mh.style.setProperty('--mc',M.color||'#7C3AED');
    mh.title=dopen?M.m+'-qavat roʼyxatini yopish':M.m+'-qavat xonalarini ochish';
    mh.innerHTML=`<span class="dm-chev">${dopen?'▾':'▸'}</span><span class="dm-tag">${M.m}-QAVAT</span> ${M.icon||''} ${M.name}
      <span class="dm-meta">${ready}/${ls.length}${mruns.length?' · <i class="dm-live"></i>'+mruns.length:''}</span>`;
    mh.onclick=()=>dirToggle(M.m);
    fls.appendChild(mh);
    if(!dopen)return; /* akkordeon yopiq — xonalar chizilmaydi */
    ls.forEach((l,rn)=>{
      const pr=progressOf(l._st), cs=curStage(l._st);
      const chip=cs?`<span class="fchip ${cs.status==='error'?'fc-err':cs.status==='gate'?'fc-gate':'fc-active'}">${CORNER[cs.status]||'⚙️'} ${RNAME(ROLES[cs.i])}</span>`
        :(pr.complete?`<span class="fchip fc-done">✅ Tayyor</span>`:`<span class="fchip fc-idle">Navbatda</span>`);
      const d=document.createElement('div');
      d.className='fl'+(l.id===stendSel?' sel':'');
      d.innerHTML=`<span class="fn">${rn+1}-XONA</span><div class="ft">${l.icon||'📄'} ${l.title}${(l.id===SELECTED&&VIEW==='room')?'<span class="fc-here">🏗️ JAMOA</span>':''}</div>
        <div class="fid">${l.id} · ${pr.done}/9</div>
        <div class="fbar"><i style="width:${pr.pct}%"></i></div>${chip}`;
      /* V6: bosish = O'SHA XONAGA KIRISH + stend ochiladi — tabiiy kutilma */
      d.onclick=()=>{
        if(SELECTED!==l.id||VIEW!=='room'){ stendSel=l.id; goRoom(l.id); renderStend(); }
        else openStend(l.id);
      };
      fls.appendChild(d);
    });
  });

  /* — tanlangan qavat — */
  const L=P.lessons.find(x=>x.id===SELECTED)||P.lessons[0]; if(!L)return;
  $('#floorPill').textContent=L.title;
  const RI=roomInfo(P,L);
  $('#floorName').textContent='«'+L.title+'» · '+RI.mod+'-qavat '+RI.no+'-xona';
  /* V5/V12: xona identiteti — devor belgisi (qavat·xona + metafora) + pol tinti (modul rangi) */
  const ws=$('#wallSign'); if(ws)ws.textContent=RI.mod+'-QAVAT · '+RI.no+'-XONA — '+(L.icon||'📄')+' '+((L.decor&&L.decor.title)||L.title.toUpperCase());
  const MCOL=(getMods(P).find(x=>x.m===(L.module||1))||{}).color||'#FF4F28';
  const ft=$('#ftint'); if(ft)ft.style.background=MCOL;
  /* V5/V12: SHTAB KAMERALARI — boshqa xonalardagi jonli ish (bosish = o'sha xonaga o'tish) */
  const cams=$('#cams'); cams.innerHTML='';
  runs.filter(r=>r.lesson&&r.lesson!==SELECTED).forEach(r=>{
    const rl=P.lessons.find(x=>x.id===r.lesson); if(!rl)return;
    const mins=Math.max(0,Math.round((Date.now()/1000-r.since)/60));
    const c=document.createElement('div');c.className='cam';
    c.title='Bosing — bu xonaga o\'tasiz';
    c.innerHTML=`<span class="cdot"></span><span>📹 <b>${r._lbl||roomLabel(P,rl)}</b> ${rl.icon||''} ${rl.title} — ${ROLES[r.role].emoji} ${RNAME(ROLES[r.role])} <small>· ${mins} daq</small></span>`;
    c.onclick=()=>goRoom(rl.id);
    cams.appendChild(c);
  });
  if(LV&&LV.gate&&LV.lastDone&&LV.lastDone.lesson&&LV.lastDone.lesson!==SELECTED){
    const gl=P.lessons.find(x=>x.id===LV.lastDone.lesson);
    if(gl){const c=document.createElement('div');c.className='cam gatecam';
      c.innerHTML=`<span class="cdot"></span><span>🚦 <b>${roomLabel(P,gl)}</b> ${gl.icon||''} ${gl.title} — <b>sizni kutmoqda</b></span>`;
      c.onclick=()=>goRoom(gl.id);cams.appendChild(c);}
  }

  /* V3: AVTO belgisi — parallel ishlayotgan barcha subagentlar */
  if(runs.length){
    $('#autoPill').style.display='';
    const txt=runs.map(r=>ROLES[r.role].emoji+' '+RNAME(ROLES[r.role])+(r.lesson?' · '+r.lesson.replace('.jsx',''):'')).join('  ‖  ');
    $('#autoTxt').textContent=(runs.length>1?runs.length+' PARALLEL ISH: ':'AVTO: ')+txt;
    $('#autoPill').title=txt;
  } else $('#autoPill').style.display='none';

  applyBots(L._st);

  /* F2: tugagan roldan hujjat ishlayotgan rolga uchadi */
  handoff.forEach(i=>{const j=L._st.findIndex(x=>x.status==='active');if(j>=0&&j!==i)flyDoc(i,j);});
  /* V2: Tekshiruvchidan qizil nuqson-hujjat mas'ul rolga */
  qaBack.forEach(i=>{flyDoc(7,i,true);pushLog('gate',`🧪 QA qaytardi: ${ROLES[i].emoji} ${RNAME(ROLES[i])} qayta ishlamoqda`);});

  /* F3: SHTAB displeyi */
  const dFloors=P.lessons.filter(l=>progressOf(l._st).complete).length;
  const pctAll=P.lessons.length?Math.round(dFloors/P.lessons.length*100):0;
  const actL=P.lessons.find(l=>curStage(l._st));
  const actS=actL&&curStage(actL._st);
  const todayN=(LV&&LV.today&&LV.today.done)||0;
  /* V3: barcha qavatlardagi joriy ishlar ro'yxati */
  let nowLine;
  if(runs.length){
    const items=runs.map(r=>{const rl=P.lessons.find(x=>x.id===r.lesson);
      return '⚙️ '+((rl&&rl.title)||r.lesson||'?')+' — '+ROLES[r.role].emoji+' '+RNAME(ROLES[r.role]);});
    nowLine=items.slice(0,2).join(' · ')+(items.length>2?' · +'+(items.length-2):'');
  } else nowLine=actS?('⚙️ '+actL.title+' — '+ROLES[actS.i].emoji+' '+RNAME(ROLES[actS.i]))
    :(LV&&LV.gate?'🚦 Tasdiq xonasida savol ochiq — javob SIZDA':'💤 Hozir faol qurilish yo\'q — jamoa dam olmoqda');
  const btvB=$('#btvBody'); if(btvB)btvB.innerHTML=
    `<div class="bl"><span>${dFloors}/${P.lessons.length} xona</span><div class="bbar"><i style="width:${pctAll}%"></i></div><span>${pctAll}%</span><span style="color:#7ff0ff">⚡ bugun: ${todayN}</span>${runs.length>1?`<span style="color:#ffd36e">‖ ${runs.length} xona</span>`:''}</div>
     <div class="bnow">${nowLine}</div>`;

  /* — avatar qatori — */
  const ar=$('#avarow'); ar.innerHTML='';
  L._st.forEach((s,i)=>{
    const av=document.createElement('div');
    av.className='ava rs-'+s.status; av.style.setProperty('--c',ROLES[i].color);
    av.title=RNAME(ROLES[i])+(ROLES[i].alias?' ('+ROLES[i].role+')':'')+' — '+STLABEL[s.status]+(s.note?' · '+s.note:'');
    av.textContent=ROLES[i].emoji;
    av.onclick=()=>{const z=$('#zone-'+i);z.classList.remove('flash');void z.offsetWidth;z.classList.add('flash');};
    ar.appendChild(av);
  });
  const cnt=document.createElement('span');cnt.className='cnt';cnt.textContent=(ROLES.length+1)+' agent';ar.appendChild(cnt);

  /* — direktor (narrator) — V4: Azizbek JONLI holatdan gapiradi, statik matn faqat zaxira — */
  const narrL=P.lessons.find(l=>curStage(l._st))||L;
  let ntxt;
  if(LV&&LV.gate) ntxt='🚦 Savol ochiq — javob sizda'+(gateQ?': «'+gateQ+'»':'!');
  else if(runs.length>1){
    /* V9: bir rol ko'p nusxada bo'lsa guruhlab aytamiz */
    const byRole={}; runs.forEach(r=>{(byRole[r.role]=byRole[r.role]||[]).push(r);});
    const parts=Object.entries(byRole).map(([ri,rr])=>{
      const R=ROLES[ri];
      return rr.length>1
        ? R.emoji+' '+RNAME(R)+' ×'+rr.length+' nusxada ('+rr.map(r=>(r._lbl||r.lesson)).join(', ')+')'
        : R.emoji+' '+RNAME(R)+' · '+(rr[0].lesson||'').replace('.jsx','');
    });
    ntxt='⚙️ Parallel ish qizg\'in: '+parts.join(' ‖ ');
  }
  else if(runs.length===1){const r=runs[0],rl=P.lessons.find(x=>x.id===r.lesson);
    const mins=Math.round((Date.now()/1000-r.since)/60);
    ntxt='⚙️ '+ROLES[r.role].emoji+' '+RNAME(ROLES[r.role])+' «'+((rl&&rl.title)||r.lesson||'?')+'» ustida ishlamoqda'+(mins>0?' ('+mins+' daq)':'')+'…';}
  else if(LV&&LV.lastError&&(Date.now()/1000-LV.lastError.at)<3600)
    ntxt='💥 '+ROLES[LV.lastError.role].emoji+' '+RNAME(ROLES[LV.lastError.role])+' xato bilan to\'xtadi ('+(LV.lastError.lesson||'')+') — qayta yuritish kerak.';
  else ntxt=(narrL&&narrL.narrator)||L.narrator||'…';
  if(director.btxt.textContent!==ntxt){
    director.btxt.textContent=ntxt;
    if(!firstLoad)pushLog('', `🤖 Azizbek: ${ntxt}`);
  }
  director.bub.classList.add('show');

  /* — bayram: tanlangan dars yakunlandi — */
  const pr=progressOf(L._st);
  if(pr.complete&&!celebrated.has(L.id)){ celebrated.add(L.id); if(!firstLoad){confetti();pushLog('done',`🎉 ${L.title} — barcha bosqichlar yakunlandi!`);} }

  /* V2: ochiq stend jonli yangilanadi */
  if(stendSel)renderStend();

  /* V11: 📱 mobil monitoring-panelini to'ldirish */
  renderMobile(P, runs);

  /* V12: BINO / QAVAT sahnalari + breadcrumb + ko'rinish almashinuvi */
  renderScenes(P, runs, L);

  /* V4: smena tarixi — localStorage bo'sh bo'lsa hookdagi history'dan tiklanadi */
  if(firstLoad&&!logLines.length&&LV&&Array.isArray(LV.history)&&LV.history.length){
    LV.history.slice(-40).forEach(h=>{
      const tm=new Date((h.t||0)*1000);
      const ts=String(tm.getHours()).padStart(2,'0')+':'+String(tm.getMinutes()).padStart(2,'0')+':'+String(tm.getSeconds()).padStart(2,'0');
      const who=(h.role!=null&&ROLES[h.role])?ROLES[h.role].emoji+' '+RNAME(ROLES[h.role]):'🚦';
      const ev=h.ev==='start'?'ish boshladi':h.ev==='done'?'tugatdi ✅':h.ev==='fail'?'XATO bilan to\'xtadi 💥':h.ev==='gate'?'savol ochildi':h.ev;
      const kind=h.ev==='fail'?'error':h.ev==='done'?'done':h.ev==='gate'?'gate':'';
      logLines.push({t:ts,kind,text:`${who} ${h.lesson||''} — ${ev}`});
      logRow(ts,kind,`${who} ${h.lesson||''} — ${ev}`);
    });
    $('#elast').textContent='📅 Smena tarixi hookdan tiklandi — '+Math.min(40,LV.history.length)+' yozuv (EXPAND)';
    saveLog();
  }

  firstLoad=false;
}

/* — V12: robotlarni yangi xona joylariga teleport (lift/fade ichida) — */
function teleportTo(id){
  const P=window.PIPELINE;
  const L=P&&P.lessons.find(x=>x.id===id);
  if(L){const st=L._st||stagesOf(L);
    const dests=destsFor(st);
    st.forEach((s,i)=>{const b=bots[i];const dest=dests[i];
      b.x=dest.x;b.y=dest.y;b.wp=[];b.excursion=false;b.destKey=dest.x+':'+dest.y;drawBot(b);});
  }
  director.x=DIRECTOR.x;director.y=DIRECTOR.y;director.wp=[];director.destKey=null;drawBot(director);
}

/* — F8/V2/V12: LIFT — endi QAVATLAR orasida (moduldan modulga ko'chishda) — */
function liftTo(id){
  const P=window.PIPELINE;
  const L=P&&P.lessons.find(x=>x.id===id);
  const ri=L?roomInfo(P,L):{mod:'?',no:'?'};

/* — V12: bitta qavat ichida xonadan xonaga — liftsiz, yumshoq fade — */

  const P=window.PIPELINE;

/* ═════ V12: SAHNALAR — bino kesimi, koridor, breadcrumb, xona-dekor ═════ */
function lessonDoorState(l,runs){
  const st=l._st||stagesOf(l), pr=progressOf(st), cs=curStage(st);
  const rr=runs.filter(r=>r.lesson===l.id);
  if(cs&&cs.status==='error')return 'err';
  if(cs&&cs.status==='gate')return 'gate';
  if(rr.length||(cs&&['active','retry','stuck'].includes(cs.status)))return 'run';
  if(st.every(s=>s.status==='skip'))return 'lock';
  if(pr.complete)return 'done';
  return 'dark';
}
function renderScenes(P,runs,L){
  const mods=getMods(P);
  document.body.dataset.view=VIEW;
  $('#bview').classList.toggle('on',VIEW==='building');
  $('#cview').classList.toggle('on',VIEW==='floor');
  $('#floorName').style.display=VIEW==='room'?'':'none';
  $('#cams').style.display=VIEW==='room'?'':'none';
  /* breadcrumb: Bino › qavat › xona */
  const M=mods.find(x=>x.m===CUR_MOD)||{};
  let h=`<button class="crumb${VIEW==='building'?' cur':''}" onclick="goBuilding()">🏢 Bino</button>`;
  if(VIEW!=='building')
    h+=`<span class="crumbsep">›</span><button class="crumb${VIEW==='floor'?' cur':''}" style="--mc:${M.color||'#7C3AED'}" onclick="goFloorView(${CUR_MOD})">${CUR_MOD}-qavat · ${M.name||''}</button>`;
  if(VIEW==='room'&&L)
    h+=`<span class="crumbsep">›</span><button class="crumb cur" style="--mc:${M.color||'#7C3AED'}">${L.icon||''} ${(L.decor&&L.decor.title)||L.title}</button>`;
  const cr=$('#crumbs'); if(cr._html!==h){cr._html=h;cr.innerHTML=h;}
  if(VIEW==='building')renderBuilding(P,runs,mods);
  if(VIEW==='floor')renderCorridor(P,runs,mods);
  if(VIEW==='room'&&L)renderDecor(L);
}
function renderBuilding(P,runs,mods){
  const bv=$('#bview');
  const floors=[...mods].sort((a,b)=>b.m-a.m).map(M=>{
    const ls=modLessons(P,M.m);
    const ready=ls.filter(l=>progressOf(l._st||stagesOf(l)).complete).length;
    const pct=ls.length?Math.round(ready/ls.length*100):0;
    const nrun=new Set(runs.filter(r=>{const rl=P.lessons.find(x=>x.id===r.lesson);return rl&&(rl.module||1)===M.m;}).map(r=>r.lesson)).size;
    const anyGate=ls.some(l=>(l._st||[]).some(s=>s.status==='gate'));
    const anyErr=ls.some(l=>(l._st||[]).some(s=>s.status==='error'));
    const wins=ls.map(l=>{
      const ds=lessonDoorState(l,runs);
      const wc=ds==='run'?'run':ds==='done'?'done':ds==='err'?'err':ds==='gate'?'gate':'';
      const wt=ds==='run'?'ish ketyapti':ds==='done'?'tayyor':ds==='err'?'xato':ds==='gate'?'sizni kutmoqda':ds==='lock'?'yopiq':'navbatda';
      return `<span class="bwin ${wc}" title="${l.icon||''} ${l.title} — ${wt}"></span>`;
    }).join('');
    return `<button class="bfl" style="--mc:${M.color||'#7C3AED'}" onclick="goFloorView(${M.m})" title="${M.m}-qavatga chiqish">
      <span class="btag">${M.m}-QAVAT</span>
      <span class="bmid">
        <span class="bname">${M.icon||''} ${M.name}</span>
        <span class="bstats"><span class="bpb"><i style="width:${pct}%"></i></span><span>${ready}/${ls.length} xona tayyor</span>
          ${nrun?`<span class="blive"><i class="bl-dot"></i>${nrun} xonada ish</span>`:''}
          ${anyGate?'<span class="bgate">🚦 sizda</span>':''}${anyErr?'<span class="berr">💥 xato</span>':''}</span>
      </span>
      <span class="bwins">${wins}</span>
    </button>`;
  }).join('');
  const html=`<div class="bldg">
    <div class="broof">🏢 PIPELINE&nbsp;HQ</div>
    ${floors}
    <div class="bbase">🚪 KIRISH · CODDY CAMP <span style="opacity:.55">· ${P.lessons.length} xona · ${mods.length} qavat</span></div>
  </div>`;
  if(bv._html!==html){bv._html=html;bv.innerHTML=html;}
}
function renderCorridor(P,runs,mods){
  const cv=$('#cview');
  const M=mods.find(x=>x.m===CUR_MOD)||mods[0]; if(!M)return;
  const ls=modLessons(P,M.m);
  const doors=ls.map((l,ix)=>{
    const ds=lessonDoorState(l,runs);
    const st=l._st||stagesOf(l), pr=progressOf(st), cs=curStage(st);
    const rr=runs.filter(r=>r.lesson===l.id);
    const who=rr.length
      ? rr.map(r=>`<span class="who" style="background:${ROLES[r.role].color}" title="${RNAME(ROLES[r.role])} ishlamoqda">${ROLES[r.role].emoji}</span>`).join('')
      : (cs&&['active','retry','stuck'].includes(cs.status)
        ? `<span class="who" style="background:${ROLES[cs.i].color}" title="${RNAME(ROLES[cs.i])}">${ROLES[cs.i].emoji}</span>`:'');
    const stTxt=ds==='run'?'⚙️ ish ketyapti':ds==='done'?'✅ tayyor':ds==='gate'?'🚦 sizda':ds==='err'?'💥 xato':ds==='lock'?'🔒 yopiq':'⬜ navbatda';
    return `<button class="door ${ds}" onclick="goRoom('${l.id}')" title="${l.title} — xonaga kirish">
      <span class="frame"><span class="leaf">
        <span class="dnum">${ix+1}-XONA</span>
        <span class="dice">${l.icon||'📄'}</span>
        ${ds==='done'?'<span class="tay">✅ TAYYOR</span>':''}
        <span class="knob"></span>
        <span class="shade"></span>
      </span><span class="under"></span></span>
      <span class="mat" style="background:${M.color||'#7C3AED'}"></span>
      <span class="plaq">${(l.decor&&l.decor.title)||l.title}</span>
      <span class="dst">${stTxt} · ${pr.done}/9</span>
      <span class="whos">${who}</span>
    </button>`;
  }).join('');
  const ready=ls.filter(l=>progressOf(l._st||stagesOf(l)).complete).length;
  const html=`<div class="corr">
    <div class="corhead" style="--mc:${M.color||'#7C3AED'}"><span class="ch-tag">${M.m}-QAVAT</span> ${M.icon||''} ${M.name}
      <span class="ch-meta">${ready}/${ls.length} xona tayyor</span></div>
    <div class="doors">${doors}</div></div>`;
  if(cv._html!==html){cv._html=html;cv.innerHTML=html;}
}
/* — xona ichidagi metafora-dekor (state.js dagi decor'dan) — */
let decorFor=null;
function renderDecor(L){
  if(decorFor===L.id)return; decorFor=L.id;

/* ═════ V2: LOYIHA STENDI — directory'dan istalgan qavat kartasi ═════ */
function openStend(id){

function closeStend(){stendSel=null;$('#stend').classList.remove('open');render();}

  const st=l._st||stagesOf(l), pr=progressOf(st);

  const fmtD=s2=>s2<90?s2+' s':Math.round(s2/60)+' daq';

    <div class="stid">${l.id} · ${pr.done}/9 bosqich · ${pr.pct}%</div>

    ${rows}

/* ═════ V11/V12: 📱 MOBIL MONITORING render — qavat→xona akkordeon ═════ */
let mobOpen=null, mobMod=null;
function mobToggle(id){mobOpen=(mobOpen===id?null:id);render();}
function mobToggleMod(m){mobMod=(mobMod===m?0:m);render();}   /* 0 = ataylab yopilgan */
function renderMobile(P, runs){
  const mob=$('#mob'); if(!mob||!P)return;
  /* alert — desktop alertdan ko'chiramiz */
  const al=$('#alert'), mAl=$('#mAlert');
  if(al&&al.classList.contains('show')){
    mAl.className='mob-alert '+(al.classList.contains('err')?'err':'warn');
    mAl.textContent=al.textContent;
  } else { mAl.className='mob-alert'; mAl.textContent=''; }
  /* ishlayotganlar */
  $('#mRuns').innerHTML = runs.length ? runs.map(r=>{
      const rl=P.lessons.find(x=>x.id===r.lesson);
      const mins=Math.max(0,Math.round((Date.now()/1000-r.since)/60));
      return `<div class="mob-run"><span class="dot"></span>${ROLES[r.role].emoji} ${RNAME(ROLES[r.role])}
        <span style="color:#8d97ab;font-weight:600">· ${rl?(rl.icon||'')+' '+rl.title:(r.lesson||'')}</span>
        <small>${mins} daq</small></div>`;
    }).join('')
    : '<div class="mob-run" style="opacity:.65"><span>💤</span> Hozir faol ish yo\'q — jamoa dam olmoqda</div>';
  /* qavatlar → xonalar akkordeoni (qavat tap = ochish/yopish, xona tap = 9-rol tafsiloti) */
  const mods=getMods(P);
  if(mobMod===null){   /* birinchi renderda faol xonaning qavati ochiq */
    const act=P.lessons.find(l=>l.id===SELECTED)||P.lessons.find(l=>curStage(l._st));
    mobMod=act?(act.module||1):((mods[0]&&mods[0].m)||1);
  }
  $('#mFloors').innerHTML = mods.map(M=>{
    const ls=modLessons(P,M.m);
    const ready=ls.filter(l=>progressOf(l._st).complete).length;
    const pct=ls.length?Math.round(ready/ls.length*100):0;
    const nrun=runs.filter(r=>{const rl=P.lessons.find(x=>x.id===r.lesson);return rl&&(rl.module||1)===M.m;}).length;
    const open=mobMod===M.m;
    const rooms=open?('<div class="mob-rooms">'+ls.map(l=>{
      const pr=progressOf(l._st), cs=curStage(l._st);
      const chip=cs?`<span class="st mst-${cs.status}">${CORNER[cs.status]||'⚙️'} ${RNAME(ROLES[cs.i])}</span>`
        :(pr.complete?'<span class="st mst-done">✅ Tayyor</span>':'');
      const det=mobOpen===l.id
        ? `<div class="mob-det">${l._st.map((s,i)=>`<div class="r"><span>${ROLES[i].emoji} ${RNAME(ROLES[i])}</span><span class="st mst-${s.status}">${STLABEL[s.status]}</span></div>`).join('')}</div>`
        : '';
      return `<div class="mob-room" onclick="event.stopPropagation();mobToggle('${l.id}')">
        <div class="t" style="font-size:12px">${l.icon||'📄'} ${l.title}<span style="margin-left:auto;font-size:10.5px;color:#8d97ab">${pr.done}/9</span>${chip}</div>
        <div class="bar"><i style="width:${pr.pct}%"></i></div>${det}</div>`;
    }).join('')+'</div>'):'';
    return `<div class="mob-fl" onclick="mobToggleMod(${M.m})">
      <div class="t"><span class="dm-tag" style="background:${M.color||'#7C3AED'}">${M.m}-QAVAT</span> ${M.name}
        <span style="margin-left:auto;font-size:11px;color:#8d97ab">${ready}/${ls.length}</span>${nrun?`<span class="st mst-active">⚙️ ${nrun}</span>`:''}</div>
      <div class="bar"><i style="width:${pct}%;background:${M.color||'#FF4F28'}"></i></div>${rooms}</div>`;
  }).join('');
  /* oxirgi voqealar */
  $('#mLog').innerHTML = logLines.slice(-4).map(l=>`[${l.t}] ${l.text}`).join('<br>')||'—';
}

/* ═════ V2: JONLI ko'rsatkich — haqiqiy yangilik vaqti (qotib qolmaydi) ═════ */
function updateFreshness(){
  const el=$('#upd'); if(!el)return;
  const LV=(window.PIPELINE_LIVE&&window.PIPELINE_LIVE.v>=2)?window.PIPELINE_LIVE:null;
  const liveEl=document.querySelector('.live');
  if(!LV||!LV.epoch){el.textContent=(window.PIPELINE&&window.PIPELINE.updated)||'—';return;}
  const s=Math.max(0,Math.round(Date.now()/1000-LV.epoch));
  el.textContent=s<90?'hozirgina':s<3600?Math.round(s/60)+' daqiqa oldin':Math.round(s/3600)+' soat oldin';
  const stale=s>900;
  if(liveEl)liveEl.classList.toggle('stale',stale);
  if(stale)el.textContent+=' · 💤';
  /* V11: mobil sarlavhadagi JONLI ham */
